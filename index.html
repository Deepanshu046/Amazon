<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo">

                </div>
            </div>

            <div class="address border">
                <div class="add">
                    <div class="add-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>

                </div>
                <div class="add1">
                    <span class="deliver">Deliver to</span> <br>
                    <span class="india">India</span>
                </div>
            </div>

            <div class="nav-search border">
                <div class="nav-container">
                    <select class="select" name="" id="">
                    <option value="">All</option>
                    <option value="">Art & Carft</option>
                    <option value="">Laptops</option>
                    <option value="">Books</option>
                </select>
                <input class="input" type="text" placeholder="Search Amazon">
                <div class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
                </div>
            </div>


            <div class="nav-signin border">
                <div class="hellosign">
                    <p class="hello">Hello, sign in</p> 
                    <p class="lst">Account & Lists</p>
                </div>
                <div class="caret">
                    <i class="fa-solid fa-caret-down"></i>
                </div>
            </div>

            <div class="returns border">
                <div class="return">
                    <p class="r">Returns</p>
                    <p class="o">& Orders</p>
                </div>

            </div>

            <div class="cart border">
                <div class="cart-icon">
                    <i class="fa-solid fa-cart-shopping " height="40px" width="30px"></i>
                </div>
                <p>cart</p>
            </div>
        </div>

        <div class="panel">
            <div class="all border">
               <i class="fa-solid fa-bars"></i><p>All</p>
            </div>

            <div class="deal border">
                <p>Today's Deals</p>
            </div>

            <div class="gift border">
                <p>Gift Cards</p>
            </div>

            <div class="sell border">
                <p>Sell</p>
            </div>

            <div class="reg border">
                <p>Registry</p>
            </div>

            <div class="prime border">
                <p>Prime Videos</p>
            </div>

            <div class="service border">
                <p>Costumer Services</p>
            </div>
        </div>
    </header>

</body>

</html>
